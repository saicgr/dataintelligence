<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ByteShards — icon preview</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,-apple-system,sans-serif;background:#0b0f15;color:#e9eef5;padding:48px;display:flex;flex-direction:column;gap:40px;align-items:center}
h1{font-size:22px;font-weight:900}
h2{font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#8a97ac;margin-bottom:14px}
.row{display:flex;gap:48px;align-items:flex-end}
.cell{text-align:center}
.cell .cap{font-size:11px;font-weight:700;color:#8a97ac;margin-top:10px}
.ic{border-radius:22.5%;overflow:hidden;display:block;box-shadow:0 18px 44px -12px rgba(0,0,0,.6)}
.panel{border-radius:24px;padding:36px 44px;display:flex;gap:48px;align-items:flex-end}
.panel.dark{background:#04060a;border:1px solid #262e3a}
.panel.light{background:#f5f6fa;border:1px solid #e9ebf0}
.panel.light .cap{color:#6b7790}
/* fake home screen */
.home{
  width:380px;border-radius:40px;padding:30px 26px;position:relative;
  background:linear-gradient(160deg,#1c2a44,#0b0f15 70%);border:1px solid #262e3a;
}
.home .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
.app{text-align:center}
.app .blank{width:62px;height:62px;border-radius:15px;background:rgba(255,255,255,.10);margin:0 auto}
.app .nm{font-size:10px;font-weight:600;color:#cfd8e6;margin-top:6px}
</style>
</head>
<body>
  <h1>ByteShards — "the byte shard" icon</h1>

  <div>
    <h2>Sizes · dark context</h2>
    <div class="panel dark">
      <div class="cell"><img class="ic" src="icon-byteshards.svg" width="220" height="220"><div class="cap">App Store · 1024</div></div>
      <div class="cell"><img class="ic" src="icon-byteshards.svg" width="120" height="120"><div class="cap">Home · 180</div></div>
      <div class="cell"><img class="ic" src="icon-byteshards.svg" width="76" height="76"><div class="cap">Spotlight · 120</div></div>
      <div class="cell"><img class="ic" src="icon-byteshards.svg" width="40" height="40"><div class="cap">Settings · 60</div></div>
    </div>
  </div>

  <div>
    <h2>Sizes · light context</h2>
    <div class="panel light">
      <div class="cell"><img class="ic" src="icon-byteshards.svg" width="120" height="120"><div class="cap">Home · 180</div></div>
      <div class="cell"><img class="ic" src="icon-byteshards.svg" width="76" height="76"><div class="cap">Spotlight · 120</div></div>
      <div class="cell"><img class="ic" src="icon-byteshards.svg" width="40" height="40"><div class="cap">Settings · 60</div></div>
    </div>
  </div>

  <div>
    <h2>On a home screen</h2>
    <div class="home">
      <div class="grid">
        <div class="app"><div class="blank"></div><div class="nm">Mail</div></div>
        <div class="app"><div class="blank"></div><div class="nm">Photos</div></div>
        <div class="app"><img class="ic" src="icon-byteshards.svg" width="62" height="62"><div class="nm">ByteShards</div></div>
        <div class="app"><div class="blank"></div><div class="nm">Maps</div></div>
        <div class="app"><div class="blank"></div><div class="nm">Music</div></div>
        <div class="app"><div class="blank"></div><div class="nm">Slack</div></div>
        <div class="app"><div class="blank"></div><div class="nm">Calendar</div></div>
        <div class="app"><div class="blank"></div><div class="nm">Notes</div></div>
      </div>
    </div>
  </div>
</body>
</html>

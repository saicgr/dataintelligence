<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- ByteShards app icon — "the byte shard"
       A faceted amber crystal (the gem you earn) with pixel-shards
       splintering off: a byte breaking into shards. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2230"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".52" r=".55">
      <stop offset="0" stop-color="#f76707" stop-opacity=".34"/>
      <stop offset=".7" stop-color="#f76707" stop-opacity=".07"/>
      <stop offset="1" stop-color="#f76707" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fragGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd43b"/>
      <stop offset="1" stop-color="#f76707"/>
    </linearGradient>
  </defs>

  <!-- canvas -->
  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="228" fill="url(#glow)"/>
  <!-- rim light -->
  <rect x="6" y="6" width="1012" height="1012" rx="222" fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="6"/>

  <!-- ground glow under the shard -->
  <ellipse cx="500" cy="888" rx="240" ry="44" fill="#f76707" opacity=".18"/>

  <!-- ===== the shard (faceted, watertight) =====
       T(488,128) UL(304,386) UR(672,386) LL(366,712) LR(610,712) B(488,884)
       C1(430,468) C2(548,468) -->
  <!-- upper facets -->
  <polygon points="488,128 304,386 430,468" fill="#ff922b"/>
  <polygon points="488,128 430,468 548,468" fill="#ffc23b"/>
  <polygon points="488,128 548,468 672,386" fill="#f76707"/>
  <!-- mid facets -->
  <polygon points="304,386 366,712 430,468" fill="#e8590c"/>
  <polygon points="672,386 548,468 610,712" fill="#d44a02"/>
  <!-- lower facets -->
  <polygon points="430,468 366,712 488,884" fill="#cf4602"/>
  <polygon points="430,468 488,884 548,468" fill="#f76707"/>
  <polygon points="548,468 488,884 610,712" fill="#a93a00"/>

  <!-- glint -->
  <polygon points="488,168 446,290 488,326 522,288" fill="#ffffff" opacity=".5"/>
  <polygon points="430,468 466,520 488,884 452,690" fill="#ffffff" opacity=".10"/>

  <!-- crack of light through the heart of the gem -->
  <polyline points="488,128 462,420 510,470 472,690 488,884"
            fill="none" stroke="#ffe8a3" stroke-opacity=".55" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== pixel-shards splintering off the right edge ===== -->
  <rect x="724" y="300" width="64" height="64" rx="12" fill="url(#fragGrad)" transform="rotate(18 756 332)"/>
  <rect x="800" y="412" width="40" height="40" rx="9" fill="#ff922b" transform="rotate(-14 820 432)" opacity=".92"/>
  <rect x="762" y="196" width="26" height="26" rx="6" fill="#ffd43b" transform="rotate(28 775 209)" opacity=".85"/>
  <polygon points="842,520 884,560 836,576" fill="#f76707" opacity=".8"/>

  <!-- one tiny shard drifting low-left for balance -->
  <polygon points="252,640 292,668 258,690" fill="#ff922b" opacity=".7"/>
</svg>
